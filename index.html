<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Dusseau &amp; Makris | CPA &amp; Accounting Services</title>
    <!-- Inter — clean modern sans-serif used throughout the site -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
    <meta
      name="description"
      content="Trusted CPA and accounting services for individuals and businesses. Tax preparation, bookkeeping, payroll support, and financial consulting."
    />
    <!-- Apply saved theme before React renders to prevent flash -->
    <script>
      (function () {
        const saved = localStorage.getItem('dm-theme');
        if (saved === 'dark') {
          document.documentElement.setAttribute('data-theme', 'dark');
        }
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
